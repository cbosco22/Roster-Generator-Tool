<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root{
    --navy-0:#06152C;
    --navy-1:#0B2348;
    --gold:#C9A85C;
    --gold-br:#E6CF8B;
    --cream:#F5F2EA;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:400px;height:400px;}
  .card{
    position:relative;width:400px;height:400px;overflow:hidden;
    background:
      radial-gradient(120% 120% at 50% 42%, #1B3E72 0%, rgba(27,62,114,0) 60%),
      linear-gradient(160deg, #0B2348 0%, #081B38 55%, #06152C 100%);
    font-family:'Oswald',sans-serif;
  }
  .card::before{
    content:"";position:absolute;inset:0;
    background-image:radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1.4px);
    background-size:7px 7px;mix-blend-mode:overlay;opacity:.5;
  }
  .card::after{
    content:"";position:absolute;inset:0;pointer-events:none;
    box-shadow:inset 0 0 90px 30px rgba(2,9,20,0.7);
  }
  .ring{
    position:absolute;left:50%;top:50%;width:340px;height:340px;
    transform:translate(-50%,-50%);border-radius:50%;
    border:3px solid var(--gold);box-shadow:0 0 0 8px rgba(201,168,92,0.14);
    z-index:2;
  }
  .stack{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    z-index:3;display:flex;flex-direction:column;align-items:center;
  }
  .stack img{height:172px;width:auto;filter:drop-shadow(0 4px 16px rgba(0,0,0,0.5));}
  .stack .lbl{margin-top:14px;text-align:center;line-height:1.05;}
  .stack .lbl b{display:block;font-family:'Oswald',sans-serif;font-weight:700;font-size:33px;
    letter-spacing:.04em;color:var(--cream);text-shadow:0 2px 8px rgba(0,0,0,0.6);}
  .stack .lbl span{display:block;margin-top:4px;font-family:'Oswald',sans-serif;font-weight:500;font-size:22px;
    letter-spacing:.14em;color:var(--gold-br);text-transform:uppercase;text-shadow:0 2px 8px rgba(0,0,0,0.6);}
</style>
</head>
<body>
  <div class="card">
    <div class="ring"></div>
    <div class="stack">
      <img src="nstar_markonly.png" alt="Navy">
      <div class="lbl"><b>BASEBALL</b><span>Recruiting</span></div>
    </div>
  </div>
</body>
</html>
