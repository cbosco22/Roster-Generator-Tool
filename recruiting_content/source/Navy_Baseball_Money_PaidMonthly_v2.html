<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root{
    --navy-0:#06152C;--navy-1:#0B2348;
    --gold:#C9A85C;--gold-deep:#A98634;--cream:#F5F2EA;--ink:#0B2348;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1080px;height:1350px;}
  .card{
    position:relative;width:1080px;height:1350px;overflow:hidden;
    background:
      radial-gradient(140% 100% at 50% 0%, #FBF9F3 0%, rgba(251,249,243,0) 60%),
      linear-gradient(170deg,#F7F4EC 0%,#EFEADE 100%);
    background-color:#F3EFE5;
    font-family:'Oswald',sans-serif;color:var(--ink);
  }
  .card::before{
    content:"";position:absolute;inset:0;
    background-image:radial-gradient(rgba(11,35,72,0.055) 1px, transparent 1.4px);
    background-size:6px 6px;opacity:.55;
  }
  .rule{position:absolute;inset:30px;border:1px solid rgba(11,35,72,0.22);pointer-events:none;}

  .wrap{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;align-items:center;text-align:center;padding:96px 90px 0;}

  .mark{height:120px;width:auto;}

  .kicker{margin-top:100px;font-weight:600;font-size:24px;letter-spacing:.5em;text-transform:uppercase;color:var(--gold-deep);}

  h1{
    margin-top:34px;
    font-family:'Anton',sans-serif;font-weight:400;text-transform:uppercase;
    font-size:186px;line-height:.92;color:var(--ink);transform:skewX(-4deg);
  }
  h1 .g{color:var(--gold-deep);}

  .sub{margin-top:46px;max-width:780px;font-weight:300;font-size:30px;line-height:1.42;color:#3E5375;}
  .sub b{font-weight:600;color:var(--ink);}
  .sub s{color:#8A97AC;text-decoration-thickness:3px;text-decoration-color:var(--gold-deep);}

  .vs{margin-top:58px;display:flex;align-items:center;gap:26px;}
  .vs .c{text-align:center;padding:24px 38px;border:1.5px solid rgba(11,35,72,0.3);border-radius:8px;}
  .vs .c.win{background:var(--navy-0);border-color:var(--navy-0);}
  .vs .c .t{font-weight:600;font-size:17px;letter-spacing:.16em;text-transform:uppercase;color:#6B7C97;}
  .vs .c.win .t{color:var(--gold);}
  .vs .c .v{margin-top:6px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:44px;line-height:1;color:var(--ink);}
  .vs .c.win .v{color:var(--cream);}
  .vs .x{font-family:'Anton';font-size:30px;color:var(--gold-deep);}

  .spacer{flex:1;}

  .band{
    position:absolute;bottom:0;left:0;width:100%;background:var(--navy-0);
    display:flex;align-items:center;justify-content:space-between;
    padding:26px 90px;z-index:3;
  }
  .band .wm{font-family:'Anton',sans-serif;font-size:34px;letter-spacing:.02em;text-transform:uppercase;color:var(--cream);transform:skewX(-7deg);}
  .band .wm span{color:var(--gold);}
  .band .tag{font-weight:300;font-size:17px;letter-spacing:.14em;text-transform:uppercase;color:#9FB1CC;}
</style>
</head>
<body>
  <div class="card">
    <div class="rule"></div>
    <div class="wrap">
      <img class="mark" src="nstar_markonly.png" alt="Navy">
      <div class="kicker">The Pitch</div>
      <h1>Paid.<br><span class="g">Every month.</span></h1>
      <p class="sub">Midshipmen draw a <b>real monthly paycheck starting freshman year</b> — while classmates elsewhere take on debt.</p>
      <div class="vs">
        <div class="c"><div class="t">Everyone else</div><div class="v">Tuition bills</div></div>
        <div class="x">VS</div>
        <div class="c win"><div class="t">At Navy</div><div class="v">A salary</div></div>
      </div>
      <div class="spacer"></div>
    </div>
    <div class="band">
      <div class="wm">Navy <span>Baseball</span></div>
      <div class="tag">Paid to learn &nbsp;·&nbsp; Paid to lead</div>
    </div>
  </div>
</body>
</html>
