# Nightly eval sync (Chris 2026-07-07) — projects unsynced player_evals into
# Recruiting Sheet 2.0 so in-app ratings/notes reach the sheet on their own,
# instead of a human remembering to run the flush. Runs overnight (off coach
# hours) and can be triggered by hand for a one-time catch-up. The script is
# dry-run-safe: it validates every op before the real write.
name: Nightly eval sync

on:
  schedule:
    - cron: "0 8 * * *"   # 08:00 UTC = 4am ET / 3am CT — overnight, off coach hours
  workflow_dispatch: {}    # manual: one-time flush + on-demand runs

concurrency:
  group: eval-sync
  cancel-in-progress: false   # never interrupt a real write mid-flush

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Flush pending evals to the sheet
        env:
          SHEET_WRITE_URL: ${{ secrets.SHEET_WRITE_URL }}
          SHEET_WRITE_TOKEN: ${{ secrets.SHEET_WRITE_TOKEN }}
        run: python3 sync_player_evals.py --send
