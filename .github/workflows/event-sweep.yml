# Global event sweep (MASS-EVENT-SWEEP lane 1 + 2) — discovers every
# FiveTool / Prospect Select event and crawls its rosters into the shared
# catalog + public_players pool, so every event is in every program's
# New-event dropdown and every rostered kid grows the pool.
#
# Runs on GitHub's runners (open network) — no VPS needed at this volume;
# move to a box only if the nightly window gets tight.
#
# Requires ONE repo Actions secret: SWEEP_DB_URL — the sweep_writer role's
# Session-pooler connection string (low-privilege: pool + queue + catalog
# only, cannot touch tenant boards).
name: Event sweep

on:
  schedule:
    - cron: "30 6 * * *"   # ~2:30am ET nightly: discover, then crawl
  workflow_dispatch:
    inputs:
      url:
        description: "Optional: one event URL to queue + crawl now (lane 2)"
        required: false
      max_events:
        description: "Max events to crawl this run"
        default: "8"
        required: false

concurrency:
  group: event-sweep
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install requests beautifulsoup4 psycopg2-binary
      - name: Queue pasted URL (lane 2)
        if: ${{ github.event.inputs.url != '' && github.event.inputs.url != null }}
        env:
          SWEEP_DB_URL: ${{ secrets.SWEEP_DB_URL }}
        run: python -m sweep.discover --url "${{ github.event.inputs.url }}"
      - name: Discover events
        if: ${{ github.event.inputs.url == '' || github.event.inputs.url == null }}
        env:
          SWEEP_DB_URL: ${{ secrets.SWEEP_DB_URL }}
        run: python -m sweep.discover
      - name: Crawl rosters -> catalog + pool
        env:
          SWEEP_DB_URL: ${{ secrets.SWEEP_DB_URL }}
          SWEEP_MAX_EVENTS: ${{ github.event.inputs.max_events || '8' }}
        run: python -m sweep.worker
